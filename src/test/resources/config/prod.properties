environment=prod

# Public assessment target. All page paths are resolved from this value.
base.url=https://mb.io/en-AE
home.path=/
explore.path=/explore
features.path=/features
otc.desk.path=/features/otc-desk
company.path=/company
support.path=/support

# Local run defaults. These should run on a developer machine without Grid.
platform=dweb
execution.mode=local
browser=chrome
headless=true

# Placeholder infrastructure values for future/Grid runs.
grid.url=http://localhost:4444/wd/hub
browserstack.url=https://hub-cloud.browserstack.com/wd/hub
browserstack.username=REPLACE_WITH_BROWSERSTACK_USERNAME
browserstack.access.key=REPLACE_WITH_BROWSERSTACK_ACCESS_KEY

# MWeb/mobile-emulation defaults.
mobile.device.name=iPhone 14 Pro
mobile.width=390
mobile.height=844

explicit.wait=20
page.load.timeout=45
retry.count=1

# Auto-healing locator settings.
auto.healing.enabled=false
auto.healing.ai.enabled=false
auto.healing.model=gpt-4.1
auto.healing.request.timeout=60
openai.api.key=REPLACE_WITH_OPENAI_API_KEY
auto.healing.mcp.url=REPLACE_WITH_MCP_SERVER_URL
auto.healing.mcp.auth.token=REPLACE_WITH_MCP_AUTH_TOKEN
screenshot.on.failure=true
report.path=test-output/reports
report.name=MultiBankAutomationReport.html
screenshot.path=test-output/screenshots
testdata.path=src/test/resources/testdata/MultiBankTestData.xlsx

# API client timeouts (seconds).
api.connect.timeout=10
api.request.timeout=30

# ExplorePage heading/label text for locators and assertions.
explore.spot.market.heading=Spot market
explore.market.sentiment.heading=Market sentiment
explore.sentiment.labels=Fear|Neutral|Greed
